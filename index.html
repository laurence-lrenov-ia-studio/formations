<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --dark:#222b32; --panel:#2b353d; --panel2:#323d46;
    --gold:#d4893a; --goldl:#e8aa5c; --cream:#f2ead8;
    --muted:#9aa7af; --line:#3a454e; --red:#e0726a; --green:#8cc63f;
    --disp:"Space Grotesk", system-ui, sans-serif;
    --body:"Inter", system-ui, -apple-system, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);background:var(--dark);color:var(--cream);line-height:1.55;-webkit-font-smoothing:antialiased;cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='28'%20height='28'%20viewBox='0%200%2028%2028'%3E%3Cpath%20d='M23%203L25%205L11%2019L7%2021L9%2015Z'%20fill='%23e8aa5c'%20stroke='%23222b32'%20stroke-width='1.5'%20stroke-linejoin='round'/%3E%3Cpath%20d='M20%206L22%208'%20stroke='%23222b32'%20stroke-width='1.3'%20stroke-linecap='round'/%3E%3C/svg%3E") 7 21, auto}
  a,button,.btn,.fcard,.mtab,.subtab,.tab,[data-go],label[for],summary{cursor:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='28'%20height='28'%20viewBox='0%200%2028%2028'%3E%3Cpath%20d='M23%203L25%205L11%2019L7%2021L9%2015Z'%20fill='%23e8aa5c'%20stroke='%23222b32'%20stroke-width='1.5'%20stroke-linejoin='round'/%3E%3Cpath%20d='M20%206L22%208'%20stroke='%23222b32'%20stroke-width='1.3'%20stroke-linecap='round'/%3E%3C/svg%3E") 7 21, pointer}
  input,textarea{cursor:text}
  a{color:inherit}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(26,33,39,.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);
    padding:10px 22px;display:flex;align-items:center;gap:14px;justify-content:space-between;flex-wrap:wrap}
  .brand{font-family:var(--disp);font-weight:700;font-size:.95rem}
  .brand span{color:var(--gold)}
  .brand .nda{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-left:8px}
  .tb-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .syncpill{font-family:var(--mono);font-size:.7rem;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:4px 10px;white-space:nowrap}
  .syncpill.ok{color:var(--green);border-color:rgba(140,198,63,.4)}
  .syncpill.warn{color:var(--goldl);border-color:rgba(232,170,92,.4)}
  .btn{appearance:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:.76rem;color:var(--cream);background:var(--panel2);border:1px solid var(--line);padding:7px 12px;border-radius:9px;transition:.12s;white-space:nowrap;text-decoration:none;display:inline-block}
  .btn:hover{border-color:var(--gold);color:#fff}
  .btn.primary{background:var(--gold);color:var(--dark);border-color:var(--gold)}
  .btn.primary:hover{background:var(--goldl)}
  .btn.ghost{background:none}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.sm{font-size:.72rem;padding:5px 9px}
  main{max-width:1080px;margin:0 auto;padding:22px 22px 60px}
  .mainnav{position:sticky;top:50px;z-index:25;background:var(--dark);border-bottom:1px solid var(--line);display:flex;gap:6px;padding:8px 22px;justify-content:center}
  .mtab{font-family:var(--disp);font-weight:600;font-size:.82rem;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:7px 16px;border-radius:20px}
  .mtab:hover{color:var(--cream);border-color:var(--gold)}
  .mtab.active{color:var(--dark);background:var(--gold);border-color:var(--gold)}
  .home-hero{background:linear-gradient(150deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:16px;padding:26px 26px 22px;margin:0 0 22px}
  .hh-eyebrow{font-family:var(--disp);font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:.68rem;color:var(--gold);margin:0 0 8px}
  .hh-title{font-family:var(--disp);font-weight:700;font-size:1.7rem;margin:0 0 4px}
  .hh-sub{color:var(--muted);margin:0 0 18px;max-width:560px}
  .home-hero .kpis{margin:0}
  /* Bandeau marque */
  .brand{display:flex;align-items:center;gap:9px}
  .bicon{display:inline-flex}.bicon svg{display:block}
  .btext span{color:var(--gold)}
  /* Écran d'accueil (splash) */
  .splash{max-width:680px;margin:14px auto;text-align:center;padding:38px 24px 30px;background:radial-gradient(120% 90% at 50% -8%, rgba(212,137,58,.20) 0%, var(--panel) 40%, var(--dark) 82%);border:1px solid var(--line);border-radius:22px}
  .hello{font-family:var(--disp);font-weight:700;font-size:clamp(1.9rem,5.2vw,2.6rem);margin:4px 0 6px;color:#fff;letter-spacing:-.01em}
  .hello span{color:var(--goldl)}
  .homestats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:24px auto 0}
  .hstat{background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--gold);border-radius:14px;padding:16px 10px;transition:.14s}
  .hstat:hover{border-color:var(--gold);transform:translateY(-2px)}
  .hv{font-family:var(--disp);font-weight:700;font-size:1.85rem;color:var(--goldl);line-height:1}
  .hl{font-size:.7rem;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:.07em}
  @media(max-width:560px){ .homestats{grid-template-columns:repeat(2,1fr)} }
  .splash-logo{display:flex;justify-content:center;margin:0 0 16px}
  .splash-eyebrow{font-family:var(--disp);font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:.72rem;color:var(--gold);margin:0 0 6px}
  .splash-title{font-family:var(--disp);font-weight:700;font-size:2.1rem;margin:0 0 6px;color:#fff}
  .splash-tag{font-style:italic;color:var(--muted);margin:0 0 24px}
  .cd{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:16px;padding:20px;margin:0 auto 24px;max-width:430px}
  .cd-eyebrow{font-family:var(--disp);font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:.66rem;color:var(--gold);margin:0 0 6px}
  .cd-big{font-family:var(--disp);font-weight:700;font-size:2.5rem;color:var(--goldl);line-height:1}
  .cd-sub{color:var(--cream);margin-top:8px;font-size:.92rem}
  .cd-sub b{color:#fff}
  .cd-date{color:var(--muted);font-size:.84rem}
  .splash-cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:0 0 24px}
  .btn.lg{font-size:.92rem;padding:12px 22px}
  .splash-kpis{max-width:480px;margin:0 auto}
  /* Agenda (administratif) */
  .agenda{list-style:none;margin:0;padding:0}
  .ag-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line)}
  .ag-row:last-child{border-bottom:none}
  .ag-j{flex:0 0 auto;font-family:var(--disp);font-weight:700;font-size:.92rem;color:var(--dark);background:var(--goldl);border-radius:8px;padding:6px 11px;min-width:62px;text-align:center}
  .ag-main{flex:1;font-size:.92rem}
  .ag-main small{display:block;color:var(--muted);font-size:.78rem;text-transform:capitalize}
  .cf-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .cf-status{margin:12px 0 0;font-family:var(--mono);font-size:.78rem;color:var(--muted)}
  .cf-status.ok{color:var(--green)}
  .cf-status.warn{color:var(--goldl)}
  .crumb{font-family:var(--mono);font-size:.76rem;color:var(--muted);margin:0 0 14px}
  .crumb a{color:var(--gold);text-decoration:none}
  h1{font-family:var(--disp);font-weight:700;font-size:1.5rem;margin:0 0 4px}
  h2{font-family:var(--disp);font-weight:700;font-size:1.15rem;margin:24px 0 10px;color:#fff}
  .sub{color:var(--muted);margin:0 0 18px}
  /* KPIs */
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 22px}
  .kpi{flex:1 1 130px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
  .kpi .v{font-family:var(--disp);font-weight:700;font-size:1.4rem;color:#fff}
  .kpi .v.gold{color:var(--goldl)}
  .kpi .l{font-size:.74rem;color:var(--muted);margin-top:2px}
  /* Cartes formation */
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .fcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.14s;border-left:3px solid var(--gold)}
  .fcard:hover{border-color:var(--gold);transform:translateY(-2px)}
  .fcard h3{font-family:var(--disp);font-weight:700;font-size:1.05rem;margin:0 0 3px}
  .fcard .fin{display:inline-block;font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.04em;color:var(--dark);background:var(--goldl);padding:2px 7px;border-radius:20px;margin-bottom:10px}
  .fcard .meta{font-size:.82rem;color:var(--muted);margin:2px 0}
  .fcard .meta b{color:var(--cream)}
  /* Tableau sessions */
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;margin:6px 0}
  table{border-collapse:collapse;width:100%;min-width:680px}
  th,td{text-align:left;padding:11px 13px;border-bottom:1px solid var(--line);font-size:.86rem;vertical-align:middle}
  thead th{background:var(--panel2);font-family:var(--disp);font-weight:600;font-size:.76rem;color:var(--cream)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  .statut{font-family:var(--mono);font-size:.72rem;padding:3px 8px;border-radius:20px;border:1px solid var(--line)}
  .statut.avenir{color:var(--goldl);border-color:rgba(232,170,92,.4)}
  .statut.faite{color:var(--green);border-color:rgba(140,198,63,.4)}
  .statut.facturee{color:#7fc4ff;border-color:rgba(127,196,255,.4)}
  .rowact{display:flex;gap:6px;flex-wrap:wrap}
  /* Fiche / formulaire */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin:14px 0}
  .card h3{font-family:var(--disp);font-weight:700;margin:0 0 12px;color:#fff}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  @media(max-width:620px){.frow{grid-template-columns:1fr}}
  label.fl{display:block;font-size:.72rem;color:var(--muted);margin:0 0 4px;font-family:var(--disp);font-weight:600}
  .fi{width:100%;font-family:var(--body);font-size:.9rem;color:var(--cream);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .fi:focus{outline:none;border-color:var(--gold)}
  select.fi{font-family:var(--body)}
  .ca-line{margin-top:14px;font-family:var(--disp);font-weight:700;font-size:1.1rem}
  .ca-line span{color:var(--goldl)}
  /* sous-onglets session */
  .subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px}
  .subtab{appearance:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:.8rem;color:var(--muted);background:none;border:1px solid var(--line);padding:8px 15px;border-radius:20px}
  .subtab[aria-selected="true"]{color:var(--dark);background:var(--gold);border-color:var(--gold)}
  /* Documents Qualiopi */
  .doclist{list-style:none;margin:0;padding:0}
  .docrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed var(--line)}
  .docrow:last-child{border-bottom:none}
  .docrow .dn{flex:1;font-size:.92rem}
  .docrow .dn small{display:block;color:var(--muted);font-size:.76rem}
  .docstat{font-family:var(--body);font-size:.82rem;color:var(--cream);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 9px}
  .empty{color:var(--muted);font-style:italic;padding:18px 0}
  .hint{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:12px 15px;font-size:.85rem;color:var(--cream);margin:12px 0}
  .hint b{color:var(--goldl)}
  /* Participants & compta */
  .tog{appearance:none;cursor:pointer;font-family:var(--disp);font-weight:600;font-size:.74rem;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:6px 11px;border-radius:20px;white-space:nowrap}
  .tog:hover{border-color:var(--gold)}
  .tog.on{color:var(--dark);background:var(--green);border-color:var(--green)}
  .tog.on.pay{background:var(--goldl);border-color:var(--goldl)}
  .ptag{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.04em;color:var(--dark);background:var(--goldl);padding:2px 7px;border-radius:20px;vertical-align:middle}
  .fi.mini{padding:7px 9px;font-size:.84rem;min-width:84px}
  .liencell{display:flex;gap:6px;align-items:center}
  footer{border-top:1px solid var(--line);text-align:center;padding:22px;color:var(--muted);font-size:.8rem}
  input[type=file]{display:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="btext">L'Rénov <span>IA Studio</span> · Formations</span><span class="nda" id="ndaTag"></span></div>
  <div class="tb-actions">
    <span class="syncpill" id="syncPill" title="Synchronisation cloud">☁ …</span>
    <button class="btn" id="btnExport">⤓ Exporter</button>
    <label class="btn" for="importer">⤒ Importer</label>
    <input type="file" id="importer" accept="application/json,.json">
    <button class="btn ghost danger sm" id="btnReset">Réinit.</button>
  </div>
</div>

<nav class="mainnav" id="mainnav">
  <a class="mtab" data-nav="accueil" href="#/accueil">Accueil</a>
  <a class="mtab" data-nav="formations" href="#/formations">Mes formations</a>
  <a class="mtab" data-nav="jourj" href="#/jourj">Jour J</a>
  <a class="mtab" data-nav="admin" href="#/admin">Administratif</a>
</nav>

<main id="app"></main>

<footer>L'Rénov IA Studio — « L'intelligence artificielle sans perdre la vôtre. » · Données enregistrées sur ce navigateur (Exporter pour sauvegarder).</footer>

<script>
// ============ Modèle de données ============
const KEY='lrenov_console_v1';
const DOCS_DEF=[
  {k:'programme',  n:'Programme détaillé',                 d:'À fournir avant la formation'},
  {k:'convention', n:'Convention de formation',            d:'Action de formation — art. L.6313-1'},
  {k:'convocation',n:'Convocation / attestation d’inscription', d:'Avant la session'},
  {k:'emargement', n:'Feuille d’émargement',               d:'Le jour J, par demi-journée'},
  {k:'attestation',n:'Attestation de présence individuelle', d:'Après la session'},
  {k:'evaluation', n:'Évaluation à chaud',                 d:'Fin de session'},
  {k:'certificat', n:'Certificat de réalisation',          d:'Après la session'},
];
const STATUTS=['à venir','faite','facturée'];
const FINANCEMENTS=['direct','CPF','OPCO','autre'];
const DOCSTATUTS=['à faire','prêt','envoyé'];

function seed(){
  return {
    studio:{nom:"L'Rénov IA Studio", prenom:"Laurence", nda:"75331795533", siret:"", adresse:"", contact:"contact@lrenov-ia.studio", prixDefaut:275},
    formations:[
      { id:'mdp', client:"Mutuelle de Poitiers Assurances", intitule:"Quelle IA pour quoi faire ?", financement:"direct", prix:275,
        sessions:[
          {id:'mdp-g1', label:"Groupe 1", date:"2026-06-15", lieu:"Saintes", inscrits:6, presents:0, statut:"à venir", docs:{}},
          {id:'mdp-g2', label:"Groupe 2", date:"2026-06-25", lieu:"Saintes", inscrits:5, presents:0, statut:"à venir", docs:{}}
        ]},
      { id:'cpf', client:"CPF", intitule:"Formation IA (financement CPF)", financement:"CPF", prix:0,
        sessions:[ {id:'cpf-s1', label:"Session à planifier", date:"", lieu:"", inscrits:2, presents:0, statut:"à venir", docs:{}} ]},
      { id:'areas', client:"Aréas", intitule:"", financement:"direct", prix:0, sessions:[] }
    ]
  };
}
let DB=seed();
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} scheduleCloud(); }
function load(){ try{ const r=localStorage.getItem(KEY); if(r) DB=JSON.parse(r); }catch(e){} }

// ============ Helpers ============
const $=s=>document.querySelector(s);
const uid=p=>p+'-'+Math.random().toString(36).slice(2,7);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=v=>{const n=parseInt(v,10);return isNaN(n)?0:n;};
function money(n){ return (n||0).toLocaleString('fr-FR')+' €'; }
function prixSession(f,s){
  const cand=[s.prix, f.prix, DB.studio.prixDefaut];
  for(const v of cand){ if(v!==undefined && v!==null && v!=='') return num(v); }
  return 0;
}
function caSession(f,s){ if(s.participants&&s.participants.length) return s.participants.reduce((t,p)=>t+num(p.montant),0); return prixSession(f,s)*num(s.inscrits); }
function encaisseSession(f,s){ return (s.participants||[]).reduce((t,p)=>t+(p.paye?num(p.montant):0),0); }
function encaisseFormation(f){ return f.sessions.reduce((t,s)=>t+encaisseSession(f,s),0); }
function caFormation(f){ return f.sessions.reduce((t,s)=>t+caSession(f,s),0); }
function elevesFormation(f){ return f.sessions.reduce((t,s)=>t+num(s.inscrits),0); }
function syncAll(){ DB.formations.forEach(f=>f.sessions.forEach(s=>{ if(Array.isArray(s.participants)){ s.inscrits=s.participants.length; s.presents=s.participants.filter(p=>p.present).length; } })); }
function mkP(nom,montant,facture,tag){ return {id:uid('p'),nom:nom,present:false,paye:false,montant:montant,facture:facture||'',lien:'',tag:tag||''}; }
function rosterG1(){ return [mkP('Marion Moreau',275,'F-2026-05-24'),mkP('Laëtitia Fuzeau',275,'F-2026-05-19'),mkP('Florence Bouchet',275,'F-2026-05-22'),mkP('Déborah Praud',275,'F-2026-05-18')]; }
function rosterG2(){ return [mkP('Elodie Brossard',275,'F-2026-05-25'),mkP('Rémi Lenglet',275,''),mkP('Alain Ayrault',275,'F-2026-05-17'),mkP('Emmanuelle Sarraf',275,''),mkP('Virginie Furet-Bouchaud',275,'F-2026-05-21'),mkP('Frantz Ardon',275,'F-2026-05-20'),mkP('Carole Aubre',0,'','offerte')]; }
function migrate(){ let ch=false; const f=getF('mdp'); if(!f) return false;
  const g1=getS(f,'mdp-g1'); if(g1&&!Array.isArray(g1.participants)){ g1.participants=rosterG1(); ch=true; }
  const g2=getS(f,'mdp-g2'); if(g2&&!Array.isArray(g2.participants)){ g2.participants=rosterG2(); ch=true; }
  if(g1&&!g1.support){ g1.support='support_apprenant_IA_MutuelleDePoitiers_15juin2026.html'; ch=true; }
  if(DB.studio&&!DB.studio.prenom){ DB.studio.prenom='Laurence'; ch=true; }
  return ch; }
function getF(fid){ return DB.formations.find(f=>f.id===fid); }
function getS(f,sid){ return f? f.sessions.find(s=>s.id===sid):null; }
function statClass(st){ return st==='faite'?'faite':st==='facturée'?'facturee':'avenir'; }

// ============ Routeur ============
function route(){
  const h=(location.hash||'#/accueil').replace(/^#/,'');
  const p=h.split('/').filter(Boolean);
  if(p[0]==='formations') renderFormations();
  else if(p[0]==='formation' && p[1]) renderFormation(p[1]);
  else if(p[0]==='session' && p[1] && p[2]) renderSession(p[1],p[2],p[3]||'infos');
  else if(p[0]==='jourj') renderJourJ();
  else if(p[0]==='admin') renderAdmin();
  else renderHome();
  setNav();
}
function setNav(){
  const h=location.hash||'#/accueil';
  let act='accueil';
  if(h.indexOf('/jourj')>=0) act='jourj';
  else if(h.indexOf('/admin')>=0) act='admin';
  else if(h.indexOf('/formation')>=0 || h.indexOf('/session')>=0) act='formations';
  document.querySelectorAll('.mtab').forEach(a=>a.classList.toggle('active',a.dataset.nav===act));
}
window.addEventListener('hashchange',route);

// ============ Vues ============
function nextSession(){
  const today=new Date(); today.setHours(0,0,0,0);
  let best=null;
  DB.formations.forEach(f=>f.sessions.forEach(s=>{ if(!s.date) return; const dt=new Date(s.date+'T00:00:00');
    if(isNaN(dt.getTime())) return; if(dt>=today && (!best||dt<best.dt)) best={dt,f,s}; }));
  return best;
}
function jLabel(days){ return days===0?'Aujourd’hui':days===1?'Demain':'J‑'+days; }
function countdownHTML(){
  const nx=nextSession();
  if(!nx) return `<div class="cd"><div class="cd-big">—</div><div class="cd-sub">Aucune formation à venir pour l'instant.</div></div>`;
  const today=new Date(); today.setHours(0,0,0,0);
  const days=Math.round((nx.dt-today)/86400000);
  const dstr=nx.dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `<div class="cd">
    <div class="cd-eyebrow">Prochaine formation</div>
    <div class="cd-big">${jLabel(days)}</div>
    <div class="cd-sub"><b>${esc(nx.f.client)}</b> · ${esc(nx.s.label)}<br><span class="cd-date">${dstr}${nx.s.lieu?(' — '+esc(nx.s.lieu)):''}</span></div>
  </div>`;
}

function agendaHTML(){
  const today=new Date(); today.setHours(0,0,0,0);
  const up=[]; DB.formations.forEach(f=>f.sessions.forEach(s=>{ if(!s.date) return; const dt=new Date(s.date+'T00:00:00');
    if(!isNaN(dt.getTime())&&dt>=today) up.push({dt,f,s}); }));
  up.sort((a,b)=>a.dt-b.dt);
  if(!up.length) return '<li class="empty">Aucune session à venir.</li>';
  return up.map(({dt,f,s})=>{
    const days=Math.round((dt-today)/86400000);
    return `<li class="ag-row"><span class="ag-j">${jLabel(days)}</span>
      <span class="ag-main"><b>${esc(f.client)}</b> · ${esc(s.label)}<small>${dt.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}${s.lieu?(' — '+esc(s.lieu)):''}</small></span>
      <a class="btn sm" href="#/session/${f.id}/${s.id}/animer">Ouvrir</a></li>`;
  }).join('');
}

function curIds(){ const p=(location.hash||'').replace(/^#\//,'').split('/'); return {fid:p[1],sid:p[2]}; }

document.addEventListener('click',e=>{
  if(e.target.id==='cloudSave'){ readCloudFields(); saveCfg(); cloudStatus('Connecté. Envoi auto actif.','ok'); cloudPush(); return; }
  if(e.target.id==='cloudPushNow'){ readCloudFields(); saveCfg(); cloudPush(); return; }
  if(e.target.id==='cloudPull'){ readCloudFields(); saveCfg(); cloudPull(); return; }
  const go=e.target.closest('[data-go]'); if(go){ location.hash=go.dataset.go; return; }
  if(e.target.id==='addF'){
    const name=prompt('Nom du client / réseau ?'); if(!name) return;
    DB.formations.push({id:uid('f'),client:name,intitule:'',financement:'direct',prix:DB.studio.prixDefaut,sessions:[]}); save(); route(); return;
  }
  if(e.target.id==='addS'){ const {fid}=curIds(); const f=getF(fid);
    f.sessions.push({id:uid('s'),label:'Nouvelle session',date:'',lieu:'',inscrits:0,presents:0,statut:'à venir',docs:{}}); save(); route(); return; }
  if(e.target.id==='dupLast'){ const {fid}=curIds(); const f=getF(fid); const last=f.sessions[f.sessions.length-1];
    if(last){ const c=JSON.parse(JSON.stringify(last)); c.id=uid('s'); c.label=(last.label||'Session')+' (copie)'; c.statut='à venir'; c.presents=0; f.sessions.push(c); save(); route(); } return; }
  const dup=e.target.closest('[data-dup]'); if(dup){ const {fid}=curIds(); const f=getF(fid); const o=getS(f,dup.dataset.dup);
    const c=JSON.parse(JSON.stringify(o)); c.id=uid('s'); c.label=(o.label||'Session')+' (copie)'; c.statut='à venir'; c.presents=0; f.sessions.push(c); save(); route(); return; }
  const del=e.target.closest('[data-del]'); if(del){ const {fid}=curIds(); const f=getF(fid);
    if(confirm('Supprimer cette session ?')){ f.sessions=f.sessions.filter(s=>s.id!==del.dataset.del); save(); route(); } return; }
  const ptg=e.target.closest('[data-ptoggle]'); if(ptg){ const {fid,sid}=curIds(); const f=getF(fid); const s=getS(f,sid);
    const p=s&&s.participants&&s.participants.find(x=>x.id===ptg.dataset.pid);
    if(p){ const k=ptg.dataset.ptoggle; p[k]=!p[k]; syncAll(); save(); route(); } return; }
  const padd=e.target.closest('[data-padd]'); if(padd){ const {fid,sid}=curIds(); const f=getF(fid); const s=getS(f,sid);
    if(s){ const nom=prompt('Nom du participant ?'); if(nom){ s.participants=s.participants||[];
      s.participants.push({id:uid('p'),nom:nom,present:false,paye:false,montant:num(f.prix||DB.studio.prixDefaut),facture:'',lien:'',tag:''}); syncAll(); save(); route(); } } return; }
  const pmv=e.target.closest('[data-pmv]'); if(pmv){ const {fid,sid}=curIds(); const f=getF(fid); const s=getS(f,sid); const to=getS(f,pmv.dataset.pmvto);
    if(s&&to&&s.participants){ const i=s.participants.findIndex(x=>x.id===pmv.dataset.pmv);
      if(i>=0){ const moved=s.participants.splice(i,1)[0]; to.participants=to.participants||[]; to.participants.push(moved); syncAll(); save(); route(); } } return; }
  const pdel=e.target.closest('[data-pdel]'); if(pdel){ const {fid,sid}=curIds(); const f=getF(fid); const s=getS(f,sid);
    if(s&&s.participants){ const p=s.participants.find(x=>x.id===pdel.dataset.pdel);
      if(p&&confirm('Retirer '+((p&&p.nom)||'ce participant')+' de la liste ?')){ s.participants=s.participants.filter(x=>x.id!==pdel.dataset.pdel); syncAll(); save(); route(); } } return; }
  const sub=e.target.closest('[data-sub]'); if(sub){ const {fid,sid}=curIds(); location.hash='#/session/'+fid+'/'+sid+'/'+sub.dataset.sub; return; }
});

// changements de champs (blur/change : pas de perte de focus)
document.addEventListener('change',e=>{
  const t=e.target; const {fid,sid}=curIds(); const f=getF(fid);
  if(t.dataset.support){ DB.formations.forEach(ff=>ff.sessions.forEach(ss=>{ if(ss.id===t.dataset.support) ss.support=t.value.trim(); })); save(); return; }
  if(t.dataset.st){ DB.studio[t.dataset.st]=t.value; save(); if(t.dataset.st==='nda') $('#ndaTag').textContent='NDA '+(DB.studio.nda||''); return; }
  if(t.dataset.f && f){ f[t.dataset.f]=t.type==='number'?num(t.value):t.value; save(); if(t.dataset.f==='client'||t.dataset.f==='prix'){} return; }
  if(t.dataset.p && f){ const s=getS(f,sid); if(s&&s.participants){ const p=s.participants.find(x=>x.id===t.dataset.pid);
    if(p){ p[t.dataset.p]= t.type==='number'?num(t.value):t.value; syncAll(); save(); route(); } } return; }
  if(t.dataset.s && f){ const s=getS(f,sid); if(s){ s[t.dataset.s]=t.type==='number'?num(t.value):t.value; save(); if(t.dataset.s==='inscrits'||t.dataset.s==='prix'){ route(); } } return; }
  if(t.dataset.sel && f){
    const id=t.dataset.sel, v=t.value;
    if(id==='f-fin'){ f.financement=v; save(); }
    else if(id==='s-stat'){ const s=getS(f,sid); if(s){s.statut=v; save();} }
    else if(id==='s-fin'){ const s=getS(f,sid); if(s){s.financement=v; save();} }
    else if(id.startsWith('doc-')){ const s=getS(f,sid); if(s){ s.docs=s.docs||{}; s.docs[id.slice(4)]=v; save(); } }
    return;
  }
});

// Export / Import / Reset
$('#btnExport').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify({app:'lrenov_console',version:1,exportedAt:new Date().toISOString(),data:DB},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='formations_sauvegarde.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1500);
});
$('#importer').addEventListener('change',ev=>{
  const fl=ev.target.files[0]; if(!fl) return; const r=new FileReader();
  r.onload=()=>{ try{ const p=JSON.parse(r.result); DB=p.data?p.data:p; migrate(); syncAll(); save(); route(); alert('Console importée.'); }
    catch(e){ alert('Fichier illisible.'); } ev.target.value=''; };
  r.readAsText(fl);
});
$('#btnReset').addEventListener('click',()=>{
  if(confirm('Réinitialiser la console aux données par défaut ?\nTon export n\'est pas touché.')){ DB=seed(); migrate(); syncAll(); save(); location.hash='#/accueil'; route(); }
});

// ============ Cloud (même backend Apps Script que le cockpit) ============
const CCFG='cockpit_console_cloud_cfg';
const SAVEDAT_KEY='lrenov_console_savedat';
const DEFAULT_CLOUD={
  url:'https://script.google.com/macros/s/AKfycbzAtt0MUnWrdMOS1SbtkiaLidYXjNNIRBSJlNv3upE0rC8s64682jbfXI4Gbs6eyKPEIw/exec',
  token:'CHANGE-MOI-mdp-2026',
  name:'console-lrenov'
};
let cloudCfg=Object.assign({},DEFAULT_CLOUD);
let cloudTimer=null, localSavedAt='';
function loadCfg(){
  try{ const r=localStorage.getItem(CCFG); if(r){ const o=JSON.parse(r); Object.keys(o).forEach(k=>{ if(o[k]!==''&&o[k]!=null) cloudCfg[k]=o[k]; }); } }catch(e){}
  if(!cloudCfg.url) cloudCfg.url=DEFAULT_CLOUD.url;
  if(!cloudCfg.token) cloudCfg.token=DEFAULT_CLOUD.token;
  if(!cloudCfg.name) cloudCfg.name=DEFAULT_CLOUD.name;
  try{ localSavedAt=localStorage.getItem(SAVEDAT_KEY)||''; }catch(e){}
}
function saveCfg(){ try{ localStorage.setItem(CCFG,JSON.stringify(cloudCfg)); }catch(e){} }
function setSavedAt(v){ localSavedAt=v||''; try{ localStorage.setItem(SAVEDAT_KEY,localSavedAt); }catch(e){} }
function setPill(kind){ const p=document.getElementById('syncPill'); if(!p) return;
  p.className='syncpill'+(kind?' '+kind:'');
  p.textContent = kind==='ok'?'☁ à jour' : kind==='warn'?'☁ hors-ligne' : '☁ …'; }
function cloudStatus(msg,kind){ const s=document.getElementById('cloudStatus'); if(s){ s.textContent=msg; s.className='cf-status'+(kind?' '+kind:''); } setPill(kind); }
function readCloudFields(){
  const u=document.getElementById('cloudUrl'),t=document.getElementById('cloudToken'),n=document.getElementById('cloudName');
  if(u)cloudCfg.url=u.value.trim()||DEFAULT_CLOUD.url; if(t)cloudCfg.token=t.value.trim()||DEFAULT_CLOUD.token; if(n)cloudCfg.name=(n.value.trim()||'console-lrenov');
}
function saveLocalOnly(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }

// JSONP GET générique — le POST est aveugle (no-cors) ; le GET, lui, a une vraie réponse
function cloudGet(onResp,onErr){
  if(!cloudCfg.url){ onErr&&onErr('nourl'); return; }
  const cb='__ccb_'+Date.now()+'_'+Math.floor(Math.random()*1e4);
  const tag=document.createElement('script'); let done=false;
  function cleanup(){ try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(tag.parentNode) tag.parentNode.removeChild(tag); }
  window[cb]=function(resp){ done=true; try{ onResp&&onResp(resp); } finally{ cleanup(); } };
  tag.onerror=function(){ if(!done){ onErr&&onErr('net'); cleanup(); } };
  tag.src=cloudCfg.url+'?action=get&session='+encodeURIComponent(cloudCfg.name||'console-lrenov')+'&token='+encodeURIComponent(cloudCfg.token||'')+'&callback='+cb+'&t='+Date.now();
  document.head.appendChild(tag);
  setTimeout(()=>{ if(!done){ onErr&&onErr('timeout'); cleanup(); } },12000);
}

function scheduleCloud(){ if(!cloudCfg.url) return; if(cloudTimer) clearTimeout(cloudTimer); cloudTimer=setTimeout(cloudPush,2200); }

function cloudPush(){
  if(!cloudCfg.url) return;
  if(typeof fetch!=='function'){ cloudStatus('Envoi indispo sur ce navigateur — utilise Exporter.','warn'); return; }
  const at=new Date().toISOString();
  const payload={token:cloudCfg.token, session:cloudCfg.name||'console-lrenov', savedAt:at, data:DB};
  cloudStatus('Envoi…');
  fetch(cloudCfg.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(()=>{ setTimeout(()=>cloudVerify(at),1400); })
    .catch(()=>cloudStatus('Hors-ligne — enregistré en local, nouvel essai à la prochaine modif.','warn'));
}

// Confirme que l'envoi a bien été stocké (on relit le cloud)
function cloudVerify(expectAt){
  cloudGet(function(resp){
    if(resp&&resp.ok&&resp.savedAt&&String(resp.savedAt)>=String(expectAt)){
      setSavedAt(resp.savedAt);
      cloudStatus('Synchronisé ✓ '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+' — « '+cloudCfg.name+' »','ok');
    } else if(resp&&resp.ok===false){
      cloudStatus('Refusé par le cloud : '+((resp&&resp.error)||'?')+(resp&&resp.error==='token'?' (le jeton ne correspond pas au script).':''),'warn');
    } else {
      cloudStatus('Envoi non confirmé — réessaie « Pousser maintenant ».','warn');
    }
  }, function(){ cloudStatus('Hors-ligne — local OK.','warn'); });
}

// Rappel auto à l'ouverture : l'appareil prend la dernière version du cloud, ou y pousse la sienne
function cloudAutoSync(){
  if(!cloudCfg.url) return;
  cloudStatus('Synchronisation…');
  cloudGet(function(resp){
    if(resp&&resp.ok&&resp.data&&resp.savedAt&&(!localSavedAt||String(resp.savedAt)>String(localSavedAt))){
      DB=resp.data; migrate(); syncAll(); saveLocalOnly(); setSavedAt(resp.savedAt); route();
      cloudStatus('À jour depuis le cloud ✓ ('+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+')','ok');
    } else if(resp&&resp.ok){
      cloudPush(); // cloud vide ou version locale au moins aussi récente -> on envoie la nôtre
    } else {
      cloudStatus('Cloud injoignable : '+((resp&&resp.error)||'?')+(resp&&resp.error==='token'?' (jeton ≠ script).':''),'warn');
    }
  }, function(){ cloudStatus('Hors-ligne — la console marche en local, synchro au retour du réseau.','warn'); });
}

function cloudPull(){
  if(!cloudCfg.url){ cloudStatus('URL du backend manquante.','warn'); return; }
  if(!confirm('Charger la console depuis le cloud ? Ça remplace les données affichées sur CET appareil.')) return;
  cloudGet(function(resp){
    if(resp&&resp.ok&&resp.data){ DB=resp.data; migrate(); syncAll(); saveLocalOnly(); setSavedAt(resp.savedAt||''); route(); cloudStatus('Console restaurée depuis le cloud ✓','ok'); }
    else if(resp&&resp.ok){ cloudStatus('Aucune sauvegarde en ligne pour ce nom.','warn'); }
    else { cloudStatus('Erreur : '+((resp&&resp.error)||'réponse invalide'),'warn'); }
  }, function(){ cloudStatus('Connexion impossible (vérifie l’URL / le déploiement).','warn'); });
}

// ============ Init ============
loadCfg();
load();
const __mig=migrate(); syncAll(); if(__mig) saveLocalOnly();
$('#ndaTag').textContent='NDA '+(DB.studio.nda||'');
route();
cloudAutoSync();
</script>
